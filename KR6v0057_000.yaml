front:
  text: 小誦鄧殿臣譯題解小誦是巴利三藏中經藏小部尼伽耶的第一經其中包括四文五經四文即四種短小誦文三皈文十戒文三十二身份和問沙彌文五經即五部短小經典吉祥經寶經戶外經伏藏經和慈悲經所有這些誦文短經原來散在長部大品經集等其它三藏經典中把它們摘選出來合編為一部是為方便初出家或初習佛法者習誦之用小誦中包含了佛法最基本教義意在指明沙彌修習佛法的主要內容由於此經既包含了基本教義又言簡意賅朗朗上口因而在廣大信衆中也廣為傳習在南傳上座部佛教國家中於普請慶典喪葬等儀式中都要誦讀此經五世紀的著名僧人佛音曾認為小部之名的由來得之於第一經小誦之名但後來的學者多反對此説因為從小誦的性質可斷定它是較晚近的纂集而小部的其它經典的形成遠遠早於此經本譯本依據斯里蘭卡國家佛教部監製出版之僧伽羅文巴利三藏翻譯譯文那牟薄伽梵阿羅漢三藐三菩提一三皈文我皈依佛我皈依法我皈依僧再皈依佛再皈依法再皈依僧三皈依佛三皈依法三皈依僧二十戒文我受持不殺生戒條我受持戒不與取戒條我受持不非梵行戒條我受持不妄語戒條我受持不飲酒戒條我受持不非時食戒條我受持不歌舞觀聽戒條我受持不塗飾香粉花鬘戒條我受持不坐臥高廣大床戒條我受持不受取金銀錢幣戒條三三十二身份此身有髮毛爪齒皮肉筋骨髓腎心肝肺大腸心肌小腸腸膜腹中食糞便膽痰膿血汗脂淚油唾液鼻涕關節液尿腦四問沙彌文何云一一切衆生依食而住命也何云二名色之謂也何云三三受之謂也何云四四聖諦之謂也何云五五取蘊色受想行識之謂也何云六六處眼耳鼻舌身意之謂也何云七七覺支念擇法精進喜輕安定捨之謂也何云八八正道正見正思維正語正業正命正精進正念正定之謂也何云九九衆生居人天梵天極光淨天遍淨天無想天四無色天之謂也何云十十支具足阿羅漢之謂也正見具足正思維具足正語具足正命具足正業具足正精進具足正念具足正定具足正智具足正解脫具足五吉祥經如是我聞一時世尊在舍捨衛城祇陀林給孤獨園住時初夜已過有一天神殊勝光明遍照園中來至佛所恭敬禮拜站立一旁以偈問佛衆人衆天神渴望得吉祥願求得幸福恭請佛宣講佛即以偈答曰不與愚人交唯與智者交供養應供者是為最吉祥居住適宜處往昔有功德置身於正法是為最吉祥多聞精技藝嚴持諸戒律言語皆善美是為最吉祥侍奉父母親護養妻與子職業甚正常是為最吉祥布施行正法善待諸親眷行為無過失是為最吉祥遠離諸惡業不飲諸酒類於法不放逸是為最吉祥恭敬而謙遜知足亦知恩及時聞教法是為最吉祥忍耐而恭順得見衆沙門適時談佛法是為最吉祥自製持梵行知見於聖諦實證涅槃法是為最吉祥世法不動心無憂無煩惱清淨趨涅槃是為最吉祥依此行持者無往而不勝處處可得福是為最吉祥六寶經天下非人諸鬼神地上非人諸鬼神聚集此處心喜悅專心聽我宣法音人們常以飲食祭不分晝夜甚誠意對人應施慈與愛精心護佑莫放逸世間天堂有珍寶不比如來更高妙依其真諦可得福佛寶才是最上寶釋迦牟尼持正念無欲無垢布法妙依此真諦可得福法寶才是最上寶佛陀宣説無間定讚美清淨之聖道依此真諦可得福此寶才是最上寶四雙八輩賢者頌善逝弟子當應供行此布施功果大僧寶就在僧團中依此真諦可得福最上之寶為是僧瞿曇教中持戒淨心定垢除智慧生趨向涅槃斷生死羅漢果位已修成依此真諦可得福最上之寶為是僧因陀羅柱入地中四面來風吹不動賢者以智悟聖諦如柱一樣甚堅定依此真諦可得福最上之寶為是僧大智佛陀宣聖諦僧能領悟並發揮該僧即使稍放逸不會再有第八生依此真諦可得福最上之寶為是僧有僧拼棄有身見以及疑惑邪戒行脫離四種地獄苦避免重大罪六種依此真諦可得福最上之寶為是僧僧得預流趨涅槃或許仍可罪業犯身口意中有過失過錯確是不可瞞依此真諦可得福最上之寶為是僧為了指示涅槃道佛陀講説高妙法如同叢林逢初夏樹頂開放新鮮花依此真諦可得福最上之寶是佛陀無上佛陀知涅槃指示無上涅槃道佛陀講説無上法無上士者佛名號依此真諦可得福最上之寶是佛寶有僧夙業已消除不戀來生斷新業種子斷絶無再生如同明燈將熄滅依此真諦可得福最上之寶是僧伽地上天下諸鬼神現皆集聚在此地如來佛陀天人供我們向佛恭敬禮願為一切衆生靈祈求吉祥與如意地上天下諸鬼神現皆集聚在此地如來佛陀天人供我們向法恭敬禮願為一切衆生靈祈求吉祥與如意地上天下諸鬼神現皆集聚在此地如來佛陀天人供我們向僧恭敬禮願為一切衆生靈祈求吉祥與如意七戶外經今有餓鬼衆回到舊時宅停於道路口立於門戶外餓鬼因罪業已被親人忘飲食雖備足餓鬼難得享餓鬼親友中亦有慈悲人淨好之飯食適時施鬼親親友願鬼親安好少禍災餓鬼自各方聚攏此處來餓鬼皆隨喜祝親福壽高親人所施食亦有善果報鬼界無農畜無商無金錢餓鬼之所需全靠世人獻諸親所施物餓鬼能得益猶如高處水流向低窪地諸親所施物餓鬼可滿足猶如江河水自向海洋注輒念去世人曾助曾有賜或曾為親友現當行布施哭泣和悲傷於鬼並無益餓鬼依然是故地受苦淒若在僧團中如此行布施利益衆餓鬼長遠得護持親情既表現餓鬼得施益比丘亦得力世人功德積八伏藏經有人將財寶埋於深穴中以待需要時於己有大用為避王之禍並防賊寇搶免借備飢荒世人埋寶藏坑深近地水寶藏慎埋入雖非總如意需時可取出藏處可移動標記可忘記龍可地下竊鬼可取而去不肖繼承人偷偷可挖取福報完結時一切皆失去設若男或女布施持戒律勤修定與慧四者為伏藏施僧敬他人善待父與母以及兄與妹此德為藏伏此藏最牢固他人難占有命終全拋開此藏可帶走福德為伏藏賊寇不能搶智者積福德永遠隨身旁如此福藏者滿足天人需所求之一切皆可能給豫色美聲音妙身段相貌好權大隨從衆福藏可得到為侯為帝王乃至轉輪王天堂諸般樂可得自伏藏人間之幸福天堂之悅樂涅槃之樂境可自伏藏得修習禪觀者可以得三明乃至得解脫福藏可使成無礙解解脫聲聞波羅密辟支佛佛地福藏可給豫福藏之功德如此大無限造福積德人智者常讚歎九慈悲經求涅槃寂靜須徹底覺悟應忠誠直率且謙和馴服應知足常樂且清間簡朴根基有智慧不依仗家族小過亦不犯不受賢者責願衆生無懼幸福而安樂懼者或安者高胖體異樣大小諸衆生皆當得吉祥可見不可見居處近或遠已生和未生均當得輕安不當互欺詐互蔑互毀辱不應互瞋恨以免他人苦於一切衆生應生無限慈猶如親父母捨身護獨子於上下左右決不結仇恨於世諸衆生唯施慈悲心行住坐臥時皆懷慈悲念堪稱為梵住精進無怠倦無有迷妄念於物無貪愛持戒有正見自不再投胎
